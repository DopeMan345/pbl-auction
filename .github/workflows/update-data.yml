name: Update Auction Data

on:
  workflow_dispatch:
    inputs:
      data:
        description: "New auction data"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Update JSON
      run: |
        echo '${{ github.event.inputs.data }}' > data.json

    - name: Commit changes
      run: |
        git config --global user.name "Auction Bot"
        git config --global user.email "actions@github.com"

        git add data.json
        git commit -m "Update auction data" || exit 0
        git push
