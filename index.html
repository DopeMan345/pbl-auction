<!DOCTYPE html>
<html>
<head>
<title>Silent Auction</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #111, #222);
    color: white;
    text-align: center;
}

h1 {
    color: orange;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    border: 1px solid orange;
    border-radius: 15px;
    padding: 20px;
    margin: 15px;
    box-shadow: 0 0 15px rgba(255,165,0,.25);
}

input {
    width: 80%;
    padding: 12px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px 18px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: orange;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

img {
    width: 220px;
    border-radius: 12px;
}

.hidden {
    display:none;
}

.auction {
    display:inline-block;
    width:280px;
}
</style>

</head>

<body>

<h1>🔥 Silent Auction 🔥</h1>

<div class="container">

<div id="auth" class="card">

<h2>Login / Signup</h2>

<input id="usernameInput" placeholder="Username"><br>

<input id="passwordInput" type="password" placeholder="Password"><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

</div>


<div id="main" class="hidden">


<div class="card">

<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>

</div>



<div id="adminPanel" class="card hidden">

<h2>🧑‍💼 Admin Panel</h2>

<input id="itemName" placeholder="Item name"><br>

<input id="itemImg" placeholder="Image URL"><br>

<input id="itemExpiry" type="datetime-local"><br>

<button onclick="addItem()">Add Auction Item</button>

</div>



<h2>Auction Items</h2>

<div id="items"></div>


</div>

</div>


<script>


// ======================
// GITHUB SETTINGS
// ======================

const OWNER = "DopeMan345";
const REPO = "pbl-auction";
const FILE = "data.json";

const TOKEN = "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";


// ======================
// VARIABLES
// ======================

let currentUser = null;
let data = null;


// ======================
// LOAD DATA
// ======================

async function loadData(){

let response = await fetch(
`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`
);

let json = await response.json();

data = JSON.parse(
atob(json.content)
);

data.sha = json.sha;

}



// ======================
// SAVE DATA
// ======================

async function saveData(){

await fetch(
`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
{

method:"PUT",

headers:{
"Authorization":"token " + TOKEN,
"Content-Type":"application/json"
},

body:JSON.stringify({

message:"update auction",

content:btoa(
JSON.stringify(data,null,2)
),

sha:data.sha

})

});

}



// ======================
// SIGNUP
// ======================

async function signup(){

let username =
document.getElementById("usernameInput").value;

let password =
document.getElementById("passwordInput").value;


if(!username || !password){

alert("Enter username and password");

return;

}


await loadData();


let exists =
data.users.some(
u=>u.user===username
);


if(exists){

alert("Username already exists");

return;

}



data.users.push({

user:username,

pass:password,

money:1000

});


await saveData();


alert("Account created!");

}



// ======================
// LOGIN
// ======================

async function login(){

let username =
document.getElementById("usernameInput").value;


let password =
document.getElementById("passwordInput").value;


await loadData();


// ADMIN LOGIN

if(
username==="BaxDaGoat1735"
&&
password==="@Bax1410!"
){

currentUser={

name:username,

admin:true

};


start();

return;

}




let account =
data.users.find(
u=>
u.user===username
&&
u.pass===password
);



if(!account){

alert("Wrong username or password");

return;

}


currentUser={

name:username,

admin:false

};


start();

}



// ======================
// START APP
// ======================

function start(){

document
.getElementById("auth")
.classList.add("hidden");


document
.getElementById("main")
.classList.remove("hidden");


document
.getElementById("welcome")
.innerText =
"Welcome " + currentUser.name;



if(currentUser.admin){

document
.getElementById("adminPanel")
.classList.remove("hidden");

}


render();

}



// ======================
// ADD ITEM
// ======================

async function addItem(){

await loadData();


data.items.push({

name:
document.getElementById("itemName").value,

img:
document.getElementById("itemImg").value,

expiry:
document.getElementById("itemExpiry").value,

highestBid:0,

highestUser:"None"

});


await saveData();


render();

}



// ======================
// DISPLAY ITEMS
// ======================

async function render(){

await loadData();


let output="";


data.items.forEach(
(item,index)=>{


let time =
new Date(item.expiry)
-
new Date();



output += `

<div class="card auction">

<h3>${item.name}</h3>

<img src="${item.img}">

<p>💰 $${item.highestBid}</p>

<p>👤 ${item.highestUser}</p>

<p>
${
time>0
?
Math.floor(time/1000)+" seconds left"
:
"ENDED"
}
</p>


${
time>0
?

`
<input id="bid${index}" placeholder="Bid">

<button onclick="bid(${index})">
Bid
</button>
`

:

""

}


</div>

`;

});


document.getElementById("items")
.innerHTML=output;


}



// ======================
// BID
// ======================

async function bid(index){

await loadData();


let amount =
parseInt(
document.getElementById("bid"+index).value
);


if(
!amount ||
amount<=data.items[index].highestBid
){

alert("Bid too low");

return;

}


data.items[index].highestBid=amount;

data.items[index].highestUser=currentUser.name;


await saveData();


render();

}



// ======================
// LOGOUT
// ======================

function logout(){

location.reload();

}


setInterval(render,5000);


</script>

</body>
</html>
